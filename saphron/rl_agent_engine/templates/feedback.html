<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .topic-box {
            margin: 5px 0;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f8f8f8;
        }
    </style>
</head>
<body>
    <h3>{{ feedback }}</h3>
    <p><strong>Your Knowledge State:</strong></p>
    {% for score in knowledge %}
        <div class="topic-box">Topic {{ loop.index0 }}: {{ "%.2f"|format(score) }}</div>
    {% endfor %}
    <br>
    <a href="{{ url_for('index') }}">Next Question</a>
</body>
</html>
